# ServiceMonitors for NimbusRetail services
# Tells Prometheus to scrape /metrics from each service in the nimbus namespace.
# Requires: service port named "http" (set in helm/nimbus-service/templates/service.yaml)
# Label "release: monitoring" matches the Prometheus serviceMonitorSelector.
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nimbus-auth-service
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - nimbus
  selector:
    matchLabels:
      app: auth-service
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
