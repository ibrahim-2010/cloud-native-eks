apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: nimbus-alerts
  namespace: monitoring
  labels:
    release: monitoring
    app: kube-prometheus-stack
spec:
  groups:
    # ── Service availability ───────────────────────────────────────────────
    - name: nimbus.availability
      rules:
        - alert: NimbusServiceDown
          expr: >
            kube_deployment_status_replicas_available{namespace="nimbus"}
            < kube_deployment_spec_replicas{namespace="nimbus"}
          for: 1m
          labels:
            severity: critical
            team: platform
            project: nimbus-retail
          annotations:
            summary: "{{ $labels.deployment }} has fewer replicas than desired"
            description: >
              Deployment {{ $labels.deployment }} in namespace nimbus has
              {{ $value }} available replicas, expected
              {{ $labels.spec_replicas }}.

        - alert: NimbusPodCrashLooping
          expr: >
            rate(kube_pod_container_status_restarts_total{namespace="nimbus"}[15m]) > 0
          for: 5m
          labels:
            severity: critical
            team: platform
            project: nimbus-retail
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: >
              Container {{ $labels.container }} in pod {{ $labels.pod }}
              has been restarting repeatedly in the nimbus namespace.

    # ── HTTP error rate ────────────────────────────────────────────────────
    - name: nimbus.http
      rules:
        - alert: NimbusHighErrorRate
          expr: >
            sum(rate(http_requests_total{namespace="nimbus", status=~"5.."}[5m]))
            by (job)
            /
            sum(rate(http_requests_total{namespace="nimbus"}[5m]))
            by (job)
            > 0.05
          for: 2m
          labels:
            severity: warning
            team: platform
            project: nimbus-retail
          annotations:
            summary: "High 5xx error rate on {{ $labels.job }}"
            description: >
              Service {{ $labels.job }} has a 5xx error rate above 5%
              over the last 5 minutes.

        - alert: NimbusHighLatency
          expr: >
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{namespace="nimbus"}[5m]))
              by (job, le)
            ) > 2
          for: 5m
          labels:
            severity: warning
            team: platform
            project: nimbus-retail
          annotations:
            summary: "High p95 latency on {{ $labels.job }}"
            description: >
              Service {{ $labels.job }} p95 response time exceeds 2 seconds.

    # ── Resource pressure ──────────────────────────────────────────────────
    - name: nimbus.resources
      rules:
        - alert: NimbusHighCPU
          expr: >
            rate(container_cpu_usage_seconds_total{namespace="nimbus"}[5m]) > 0.8
          for: 2m
          labels:
            severity: warning
            team: platform
            project: nimbus-retail
          annotations:
            summary: "High CPU on {{ $labels.container }} in nimbus"
            description: >
              Container {{ $labels.container }} in pod {{ $labels.pod }}
              is using more than 80% of its CPU limit.

        - alert: NimbusHighMemory
          expr: >
            container_memory_working_set_bytes{namespace="nimbus"}
            / container_spec_memory_limit_bytes{namespace="nimbus"} > 0.85
          for: 2m
          labels:
            severity: warning
            team: platform
            project: nimbus-retail
          annotations:
            summary: "High memory on {{ $labels.container }} in nimbus"
            description: >
              Container {{ $labels.container }} is using more than 85%
              of its memory limit. OOMKill risk.

    # ── Kafka consumer lag ─────────────────────────────────────────────────
    - name: nimbus.kafka
      rules:
        - alert: NimbusKafkaConsumerLag
          expr: >
            kafka_consumergroup_lag{namespace="kafka"} > 1000
          for: 5m
          labels:
            severity: warning
            team: platform
            project: nimbus-retail
          annotations:
            summary: "Kafka consumer lag is high for group {{ $labels.consumergroup }}"
            description: >
              Consumer group {{ $labels.consumergroup }} on topic
              {{ $labels.topic }} has a lag of {{ $value }} messages.
              The notification-service may be falling behind.
